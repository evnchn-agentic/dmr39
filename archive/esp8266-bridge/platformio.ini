; PlatformIO Project Configuration
; SUPER DMR-39 STB Bridge — self-contained ESP8266 web server
; Board: ESP8266 NodeMCU Amica
;
; Wiring (4 wires only, no IR):
;   GND → GND
;   3V3 → VDD
;   D2/GPIO4 → DAT
;   D1/GPIO5 → CLK
;
; Front panel IC: HW650EP (FD650 family)
;
; WiFi credentials are in wifi_credentials.ini (gitignored).
; Copy wifi_credentials.ini.example and fill in your SSID/password.

[platformio]
extra_configs = wifi_credentials.ini

[env:nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 230400
upload_speed = 921600
board_build.f_cpu = 160000000L  ; 160MHz (official max, not overclock)
build_unflags = -Os             ; remove default size optimization (wifi_credentials.ini adds -O2)

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    me-no-dev/ESPAsyncWebServer@^1.2.4
    me-no-dev/ESPAsyncTCP@^1.2.2

[env:keyreader]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
src_filter = +<keyreader.cpp> -<main.cpp> -<hw650_emu.cpp> -<analyzer.cpp> -<tm1650.cpp>
