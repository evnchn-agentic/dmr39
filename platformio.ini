; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
upload_before_reset = usb_reset
upload_after_reset = hard_reset
lib_deps = crankyoldgit/IRremoteESP8266@^2.9.0

; OTA upload: pio run -e ota -t upload
[env:ota]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
lib_deps = crankyoldgit/IRremoteESP8266@^2.9.0
upload_protocol = espota
upload_port = 192.168.50.214
; OTA password: must match OTA_PASSWORD in src/wifi_credentials.h
upload_flags = --auth=${sysenv.DMR39_OTA_PASS}
